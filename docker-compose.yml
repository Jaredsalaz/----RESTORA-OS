version: '3.9'

services:
  # ─── Base de Datos ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restora_db
      POSTGRES_USER: restora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # ─── Cache y Pub/Sub ─────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # ─── Backend API ─────────────────────────────────
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://restora:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/restora_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      SECRET_KEY: ${SECRET_KEY:-this_is_a_very_secret_key_for_jwt}
      ENVIRONMENT: development
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src

  # ─── Frontend ────────────────────────────────────
  frontend:
    build: 
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ─── Almacenamiento de archivos ──────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ─── Monitoreo ───────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@restora.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
